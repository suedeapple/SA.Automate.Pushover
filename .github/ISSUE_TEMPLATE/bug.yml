name: Bug report
description: Report a bug in SA.Automate.Pushover
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report this issue as thoroughly as possible.
  - type: input
    id: package-version
    attributes:
      label: SA.Automate.Pushover version
      placeholder: e.g. 1.0.0
    validations:
      required: false
  - type: input
    id: umbraco-version
    attributes:
      label: Umbraco version
      placeholder: e.g. 17.0.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug summary
      description: Describe the bug — pinpoint it as much as possible and focus on the actual problem rather than your assumed solution.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behaviour on a clean installation. Include links, screenshots, and stack traces where relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behaviour
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true
