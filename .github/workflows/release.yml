name: Release to NuGet

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Nuget Login
        uses: Nuget/login@v1
        id: login
        with: 
          user: scottishcoder

      
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack
        run: dotnet pack src/OC.Automate.Mastodon/OC.Automate.Mastodon.csproj -c Release /p:Version=${{ github.ref_name }} --output artifacts

        # Push the package
      - name: NuGet push
        run: dotnet nuget push "artifacts/*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
